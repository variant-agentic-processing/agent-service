name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build
        run: docker build -t us-central1-docker.pkg.dev/variant-processing/genomic-pipeline/agent-service:${{ github.sha }} .

      - name: Push
        run: docker push us-central1-docker.pkg.dev/variant-processing/genomic-pipeline/agent-service:${{ github.sha }}

      - name: Deploy
        run: gcloud run deploy agent-service --image us-central1-docker.pkg.dev/variant-processing/genomic-pipeline/agent-service:${{ github.sha }} --region us-central1 --project variant-processing
